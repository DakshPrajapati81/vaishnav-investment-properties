<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Vaishnav Investment & Properties</title>
  <meta name="description" content="Admin login for Vaishnav Investment & Properties management panel.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar navbar-solid" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <img src="assets/images/vp-removebg-preview.png" alt="Vaishnav Investment & Properties Logo">
        <div class="logo-text">
          <strong>Vaishnav Investment</strong>
          <span>& Properties</span>
        </div>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="properties.html">Properties</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
        <a href="add-property.html" class="nav-add-btn admin-only" style="display:none;"><i class="fas fa-plus"></i> Add Property</a>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>
  <div class="nav-overlay" id="navOverlay"></div>

  <!-- Login Section -->
  <section class="login-section">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon">
          <i class="fas fa-lock"></i>
        </div>
        <h2>Admin Login</h2>
        <p>Sign in to manage properties</p>
      </div>

      <form id="login-form">
        <div class="login-form-group">
          <label for="login-username"><i class="fas fa-user"></i> Username</label>
          <input type="text" id="login-username" placeholder="Enter your username" required autocomplete="username">
        </div>
        <div class="login-form-group">
          <label for="login-password"><i class="fas fa-key"></i> Password</label>
          <div class="password-field">
            <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" class="toggle-password" id="toggle-password">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="login-error" id="login-error" style="display:none;">
          <i class="fas fa-exclamation-circle"></i>
          <span id="login-error-text"></span>
        </div>
        <button type="submit" class="btn btn-primary login-btn" id="login-btn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>

      <div class="login-footer">
        <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // If already logged in, redirect to home
      const token = localStorage.getItem('adminToken');
      if (token) {
        fetch('/api/auth/verify', {
          headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(r => r.json())
        .then(data => {
          if (data.valid) {
            window.location.href = 'index.html';
          }
        });
      }

      // Toggle password visibility
      document.getElementById('toggle-password').addEventListener('click', () => {
        const passInput = document.getElementById('login-password');
        const icon = document.querySelector('#toggle-password i');
        if (passInput.type === 'password') {
          passInput.type = 'text';
          icon.className = 'fas fa-eye-slash';
        } else {
          passInput.type = 'password';
          icon.className = 'fas fa-eye';
        }
      });

      // Handle login
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const loginBtn = document.getElementById('login-btn');
        const errorEl = document.getElementById('login-error');
        const errorText = document.getElementById('login-error-text');

        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;

        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
        loginBtn.disabled = true;
        errorEl.style.display = 'none';

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || 'Login failed');
          }

          // Save token
          localStorage.setItem('adminToken', data.token);

          // Show success briefly
          loginBtn.innerHTML = '<i class="fas fa-check"></i> Login Successful!';
          loginBtn.style.background = '#10B981';

          setTimeout(() => {
            window.location.href = 'index.html';
          }, 800);

        } catch (err) {
          errorText.textContent = err.message;
          errorEl.style.display = 'flex';
          loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
          loginBtn.disabled = false;

          // Shake animation
          document.querySelector('.login-card').classList.add('shake');
          setTimeout(() => document.querySelector('.login-card').classList.remove('shake'), 500);
        }
      });
    });
  </script>
</body>
</html>
